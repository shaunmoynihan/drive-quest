/* ============================================================
   DRIVEQUEST — NC Student Behind-the-Wheel, gamified.
   Arcade road-trip theme. Quiz + step-sequencing puzzles.
   Progress saves on-device via the browser (localStorage).
   ============================================================ */

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --asphalt:#15182B; --asphalt2:#1E2340; --panel:#272D52; --panel2:#313870;
  --line:#FFD23F; --green:#2DC76F; --green-d:#1d9c55; --red:#FF5A5F; --red-d:#d8383d;
  --cream:#F6F4EC; --muted:#9AA0C9; --blue:#4DA3E0; --purple:#8A6BFF;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
.dq-root{
  font-family:'Nunito',system-ui,sans-serif; color:var(--cream);
  background:
    radial-gradient(1200px 600px at 50% -10%, #2a2f5e 0%, rgba(42,47,94,0) 60%),
    linear-gradient(180deg,#15182B 0%, #11131F 100%);
  min-height:100%; width:100%; overflow-x:hidden;
}
.dq-wrap{max-width:540px; margin:0 auto; padding:0 16px 120px; position:relative;}
.dq-display{font-family:'Fredoka',sans-serif;}

/* ---- HUD ---- */
.hud{position:sticky; top:0; z-index:40; padding:12px 16px 10px;
  background:linear-gradient(180deg,#15182B 70%, rgba(21,24,43,0));
  backdrop-filter:blur(2px);}
.hud-inner{max-width:540px; margin:0 auto;}
.hud-top{display:flex; align-items:center; gap:10px;}
.hud-rank{flex:1; min-width:0;}
.hud-rank .label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:800;}
.hud-rank .name{font-family:'Fredoka',sans-serif; font-size:18px; font-weight:700; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.chip{display:flex; align-items:center; gap:5px; background:var(--panel); border-radius:999px;
  padding:6px 11px; font-weight:800; font-size:14px; border:1px solid rgba(255,255,255,.06);}
.chip.star{color:var(--line);} .chip.streak{color:#ff9a4d;}
.xpbar{margin-top:9px; height:11px; background:#0e1020; border-radius:999px; overflow:hidden;
  border:1px solid rgba(255,255,255,.06);}
.xpfill{height:100%; background:linear-gradient(90deg,var(--green),#7CF0A8); border-radius:999px; transition:width .5s cubic-bezier(.2,.8,.2,1);}
.xpmeta{display:flex; justify-content:space-between; margin-top:4px; font-size:11px; color:var(--muted); font-weight:700;}

/* ---- Logo / header ---- */
.brand{display:flex; align-items:center; gap:12px; padding:18px 2px 8px;}
.brand h1{font-family:'Fredoka',sans-serif; font-size:30px; margin:0; line-height:.95; font-weight:700;}
.brand .sub{color:var(--muted); font-size:12.5px; font-weight:700; letter-spacing:.04em;}
.wheel{filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));}

/* ---- Road map ---- */
.road{position:relative; padding:14px 0 8px;}
.road-line{position:absolute; left:50%; top:0; bottom:0; width:46px; transform:translateX(-50%);
  background:
    repeating-linear-gradient(180deg, var(--line) 0 18px, transparent 18px 40px) center/5px 100% no-repeat,
    linear-gradient(180deg,#33384f,#2a2e44);
  border-left:3px solid #444a66; border-right:3px solid #444a66; border-radius:30px; z-index:0;}
.stop{position:relative; z-index:1; display:flex; align-items:center; min-height:118px;}
.stop .side{flex:1; min-width:0;}
.node{width:62px; height:62px; flex:0 0 62px; border-radius:18px; display:grid; place-items:center;
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:24px; position:relative;
  border:3px solid rgba(0,0,0,.25); box-shadow:0 8px 0 rgba(0,0,0,.25), 0 10px 18px rgba(0,0,0,.35);
  transition:transform .12s;}
.node:active{transform:translateY(2px);}
.node.locked{background:#2a2f49; color:#5b618a; box-shadow:0 6px 0 rgba(0,0,0,.25);}
.card{background:var(--panel); border:1px solid rgba(255,255,255,.07); border-radius:16px; padding:11px 13px;
  box-shadow:0 8px 22px rgba(0,0,0,.3); cursor:pointer; transition:transform .12s, box-shadow .12s;}
.card:active{transform:translateY(2px) scale(.99);}
.card.dim{opacity:.5; filter:grayscale(.5);}
.card .ttl{font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; line-height:1.05;}
.card .meta{color:var(--muted); font-size:12px; font-weight:700; margin-top:2px;}
.stars{display:flex; gap:2px; margin-top:6px; font-size:13px;}
.car-pin{position:absolute; left:50%; transform:translateX(-50%); font-size:30px; z-index:3;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.5)); animation:bob 2.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)}}
.lockmsg{font-size:11px; color:var(--muted); font-weight:700; margin-top:4px;}

/* ---- Phase detail ---- */
.sheet{padding-top:6px;}
.back{display:inline-flex; align-items:center; gap:6px; background:var(--panel); border:none; color:var(--cream);
  font-family:'Nunito'; font-weight:800; font-size:14px; padding:9px 14px; border-radius:999px; margin:8px 0 4px; cursor:pointer;}
.phase-hd{display:flex; gap:13px; align-items:center; margin:6px 0 14px;}
.phase-emoji{width:58px;height:58px;flex:0 0 58px;border-radius:16px;display:grid;place-items:center;font-size:30px;box-shadow:0 6px 0 rgba(0,0,0,.25);}
.phase-hd h2{font-family:'Fredoka'; font-size:23px; margin:0; line-height:1;}
.phase-hd p{margin:3px 0 0; color:var(--muted); font-size:13px; font-weight:700;}
.chal{display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid rgba(255,255,255,.06);
  border-radius:16px; padding:14px; margin-bottom:11px; cursor:pointer; transition:transform .1s;}
.chal:active{transform:scale(.99);}
.chal .ic{width:44px;height:44px;flex:0 0 44px;border-radius:12px;display:grid;place-items:center;font-size:21px;}
.chal .gr{flex:1; min-width:0;}
.chal .gr .t{font-family:'Fredoka'; font-weight:600; font-size:16px;}
.chal .gr .s{color:var(--muted); font-size:12.5px; font-weight:700;}
.chal .go{font-size:20px; color:var(--muted);}

/* ---- Play screen ---- */
.play{padding-top:8px;}
.play-top{display:flex; align-items:center; gap:10px; margin:6px 0 14px;}
.quit{background:var(--panel); border:none; color:var(--cream); font-size:18px; width:40px; height:40px; border-radius:12px; cursor:pointer; font-weight:800;}
.fuel{flex:1; display:flex; align-items:center; gap:8px;}
.fuel .lab{font-size:13px;}
.bars{display:flex; gap:4px;}
.bar{width:18px; height:13px; border-radius:3px; background:#0e1020; border:1px solid rgba(255,255,255,.08);}
.bar.on{background:linear-gradient(180deg,#3be089,#1d9c55);}
.bar.low{background:linear-gradient(180deg,#ff8a5c,#e0533a);}
.combo{font-family:'Fredoka'; font-weight:700; color:#ff9a4d; font-size:15px; min-width:54px; text-align:right;}
.qprog{height:7px;background:#0e1020;border-radius:99px;overflow:hidden;margin-bottom:16px;}
.qprog>div{height:100%;background:var(--blue);transition:width .35s;}

.q{font-family:'Fredoka'; font-weight:600; font-size:21px; line-height:1.18; margin:6px 0 18px;}
.opts{display:flex; flex-direction:column; gap:11px;}
.opt{text-align:left; background:var(--panel); border:2px solid rgba(255,255,255,.06); color:var(--cream);
  font-family:'Nunito'; font-weight:700; font-size:16px; padding:15px 16px; border-radius:14px; cursor:pointer;
  transition:transform .08s, border-color .15s, background .15s; line-height:1.2;}
.opt:active{transform:scale(.99);}
.opt.correct{border-color:var(--green); background:rgba(45,199,111,.16);}
.opt.wrong{border-color:var(--red); background:rgba(255,90,95,.14);}
.opt.faded{opacity:.45;}
.opt .tag{float:right; font-weight:800; margin-left:8px;}
.explain{margin-top:16px; background:var(--asphalt2); border:1px solid rgba(255,255,255,.07);
  border-left:4px solid var(--line); border-radius:12px; padding:13px 15px; font-size:14.5px; font-weight:600; line-height:1.35;
  animation:pop .25s ease;}
.explain b{color:var(--line);}

/* ---- Sequence puzzle ---- */
.seq-hint{color:var(--muted); font-size:13px; font-weight:700; margin-bottom:12px;}
.slots{display:flex; flex-direction:column; gap:8px; margin-bottom:14px;}
.slot{display:flex; align-items:center; gap:11px; background:var(--asphalt2); border:2px dashed rgba(255,255,255,.12);
  border-radius:12px; padding:11px 12px; min-height:50px; font-weight:700; font-size:14.5px; line-height:1.2; cursor:pointer;}
.slot.filled{border-style:solid; border-color:rgba(255,255,255,.1); background:var(--panel);}
.slot.ok{border-color:var(--green); background:rgba(45,199,111,.14);}
.slot.bad{border-color:var(--red); background:rgba(255,90,95,.12); animation:shake .3s;}
.slot .num{width:26px;height:26px;flex:0 0 26px;border-radius:8px;background:var(--panel2);display:grid;place-items:center;
  font-family:'Fredoka';font-weight:700;font-size:14px;}
.slot.empty .num{background:#0e1020; color:#5b618a;}
.pool{display:flex; flex-direction:column; gap:9px;}
.poolcard{background:var(--panel); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:13px 14px;
  font-weight:700; font-size:14.5px; line-height:1.2; cursor:pointer; transition:transform .08s; box-shadow:0 4px 0 rgba(0,0,0,.2);}
.poolcard:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.2);}

/* ---- Buttons ---- */
.btn{display:block; width:100%; border:none; cursor:pointer; font-family:'Fredoka',sans-serif; font-weight:600;
  font-size:18px; padding:16px; border-radius:16px; margin-top:18px; color:#10131f; box-shadow:0 6px 0 rgba(0,0,0,.3);
  transition:transform .1s, box-shadow .1s;}
.btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.3);}
.btn.green{background:linear-gradient(180deg,#41e08a,#23b563);}
.btn.yellow{background:linear-gradient(180deg,#ffdf5e,#f2c00f);}
.btn.ghost{background:var(--panel); color:var(--cream); box-shadow:0 5px 0 rgba(0,0,0,.25);}
.btn:disabled{opacity:.4; cursor:not-allowed;}

/* ---- Results ---- */
.result{text-align:center; padding-top:26px;}
.result .big{font-family:'Fredoka'; font-size:30px; font-weight:700; margin:14px 0 2px;}
.result .starshow{font-size:46px; letter-spacing:6px; margin:10px 0;}
.result .row{display:flex; justify-content:center; gap:26px; margin:20px 0 4px;}
.result .row .k{color:var(--muted); font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.1em;}
.result .row .v{font-family:'Fredoka'; font-size:26px; font-weight:700;}

/* ---- Cockpit / reference ---- */
.ref-card{background:var(--panel); border:1px solid rgba(255,255,255,.07); border-radius:16px; padding:16px; margin-bottom:14px;}
.ref-card h3{font-family:'Fredoka'; margin:0 0 4px; font-size:17px;}
.ref-card p{margin:0; color:#cfd3ef; font-size:14px; font-weight:600; line-height:1.4;}
.dash{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;}
.dlight{display:flex; align-items:center; gap:7px; background:var(--asphalt2); border-radius:10px; padding:7px 10px; font-size:12.5px; font-weight:800;}

/* ---- misc ---- */
.tabbar{position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(20,23,40,.92);
  backdrop-filter:blur(8px); border-top:1px solid rgba(255,255,255,.07); display:flex; justify-content:center; gap:6px; padding:8px;}
.tab{flex:1; max-width:170px; background:none; border:none; color:var(--muted); font-family:'Fredoka'; font-weight:600;
  font-size:13px; padding:7px; border-radius:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px;}
.tab.active{color:var(--cream); background:var(--panel);}
.tab .i{font-size:19px;}
.toast{position:fixed; top:74px; left:50%; transform:translateX(-50%); z-index:60; background:var(--green-d);
  color:#fff; font-weight:800; padding:9px 18px; border-radius:999px; font-size:14px; box-shadow:0 8px 20px rgba(0,0,0,.4);
  animation:pop .3s ease;}
.confetti{position:fixed; inset:0; pointer-events:none; z-index:55; overflow:hidden;}
.cf{position:absolute; width:9px; height:14px; border-radius:2px; top:-20px; animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg); opacity:.9}}
@keyframes pop{from{transform:scale(.9); opacity:0} to{transform:scale(1); opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.empty{text-align:center; color:var(--muted); font-weight:700; padding:40px 10px;}
@media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important}}
`;

const RANKS = [
  [0,"Permit · Day 1"],[60,"Parking-Lot Pro"],[160,"Block Navigator"],[300,"Stop-Sign Specialist"],
  [480,"Two-Lane Tactician"],[700,"City Slicker"],[960,"Expressway Expert"],[1260,"Maneuver Master"],[1600,"🏆 Road Master"],
];
function rankFor(xp){ let r=RANKS[0],next=null; for(let i=0;i<RANKS.length;i++){ if(xp>=RANKS[i][0]){r=RANKS[i]; next=RANKS[i+1]||null;} } return {name:r[1], floor:r[0], next}; }

/* build flat challenge list per phase */
function challengesOf(p){
  const list=[];
  if(p.quiz.length) list.push({id:p.id+"-quiz", kind:"quiz", title:"Knowledge Check", icon:"❓", sub:p.quiz.length+" questions", items:p.quiz});
  p.sequences.forEach((s,i)=>list.push({id:p.id+"-seq"+i, kind:"seq", title:s.title, icon:s.icon, sub:s.steps.length+" steps in order", steps:s.steps}));
  return list;
}
const shuffle = a => { const x=a.slice(); for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]];} return x; };

const STORE_KEY="ncdrive:v1";

/* ===================== APP ===================== */
function DriveQuest(){
  const [loaded,setLoaded]=useState(false);
  const [xp,setXp]=useState(0);
  const [stars,setStars]=useState({});        // challengeId -> best stars
  const [bestStreak,setBestStreak]=useState(0);
  const [totalCorrect,setTotalCorrect]=useState(0);
  const [view,setView]=useState("map");        // map | phase | play | reference
  const [phaseId,setPhaseId]=useState(null);
  const [challenge,setChallenge]=useState(null);
  const [toast,setToast]=useState(null);
  const [confetti,setConfetti]=useState(false);
  const saveRef=useRef();

  /* load */
  useEffect(()=>{
    try{ const v=localStorage.getItem(STORE_KEY); if(v){ const d=JSON.parse(v);
      setXp(d.xp||0); setStars(d.stars||{}); setBestStreak(d.bestStreak||0); setTotalCorrect(d.totalCorrect||0);} }
    catch(e){/* first run */} setLoaded(true);
  },[]);

  const persist=(next)=>{ const data={xp,stars,bestStreak,totalCorrect,...next};
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(()=>{ try{ localStorage.setItem(STORE_KEY,JSON.stringify(data));}catch(e){} },150);
  };

  const showToast=(t)=>{ setToast(t); setTimeout(()=>setToast(null),1600); };

  const phaseStars=(p)=>{ const ch=challengesOf(p); return ch.reduce((s,c)=>s+(stars[c.id]||0),0); };
  const phaseMax=(p)=>challengesOf(p).length*3;
  const isUnlocked=(idx)=> idx===0 ? true : phaseStars(PHASES[idx-1])>=1;

  const finishChallenge=(cid,earnedStars,gainedXp,roundStreak)=>{
    const prevBest=stars[cid]||0;
    const newStars={...stars,[cid]:Math.max(prevBest,earnedStars)};
    const newXp=xp+gainedXp;
    const newBestStreak=Math.max(bestStreak,roundStreak);
    setStars(newStars); setXp(newXp); setBestStreak(newBestStreak);
    persist({stars:newStars,xp:newXp,bestStreak:newBestStreak});
    const rBefore=rankFor(xp).name, rAfter=rankFor(newXp).name;
    if(rBefore!==rAfter) showToast("⬆️ New rank: "+rAfter);
    setConfetti(true); setTimeout(()=>setConfetti(false),1400);
  };
  const addCorrect=()=>{ setTotalCorrect(c=>{ const n=c+1; persist({totalCorrect:n}); return n; }); };

  if(!loaded) return (<div className="dq-root"><style>{CSS}</style><div className="empty" style={{paddingTop:120}}>🚗 Warming up the engine…</div></div>);

  const rank=rankFor(xp);
  const totalStarsAll=PHASES.reduce((s,p)=>s+phaseStars(p),0);

  return (
    <div className="dq-root">
      <style>{CSS}</style>
      {confetti && <Confetti/>}
      {toast && <div className="toast">{toast}</div>}

      {/* HUD */}
      <div className="hud">
        <div className="hud-inner">
          <div className="hud-top">
            <div className="hud-rank">
              <div className="label">Rank</div>
              <div className="name">{rank.name}</div>
            </div>
            <div className="chip star">⭐ {totalStarsAll}</div>
            <div className="chip streak">🔥 {bestStreak}</div>
          </div>
          <div className="xpbar"><div className="xpfill" style={{width: rank.next? Math.min(100,((xp-rank.floor)/(rank.next[0]-rank.floor))*100)+"%":"100%"}}/></div>
          <div className="xpmeta"><span>{xp} XP</span><span>{rank.next? rank.next[0]+" XP → "+rank.next[1] : "MAX RANK"}</span></div>
        </div>
      </div>

      <div className="dq-wrap">
        {view==="map" && (
          <MapView onPick={(p,idx)=>{ if(isUnlocked(idx)){ setPhaseId(p.id); setView("phase"); } else showToast("🔒 Earn a star in the phase above first"); }}
            isUnlocked={isUnlocked} phaseStars={phaseStars} phaseMax={phaseMax}/>
        )}

        {view==="phase" && (()=>{ const p=PHASES.find(x=>x.id===phaseId); const ch=challengesOf(p);
          return (<div className="sheet">
            <button className="back" onClick={()=>setView("map")}>← Map</button>
            <div className="phase-hd">
              <div className="phase-emoji" style={{background:p.color}}>{p.emoji}</div>
              <div><h2 className="dq-display">{p.name}</h2><p>{p.subtitle}</p></div>
            </div>
            {ch.map(c=>{ const s=stars[c.id]||0; return (
              <div className="chal" key={c.id} onClick={()=>{ setChallenge(c); setView("play"); }}>
                <div className="ic" style={{background:p.color+"33"}}>{c.icon}</div>
                <div className="gr"><div className="t">{c.title}</div><div className="s">{c.sub} · {"⭐".repeat(s)||"not done"}</div></div>
                <div className="go">▶</div>
              </div>); })}
          </div>); })()}

        {view==="play" && challenge && (
          challenge.kind==="quiz"
            ? <QuizPlay key={challenge.id} challenge={challenge} color={(PHASES.find(p=>p.id===phaseId)||{}).color}
                onCorrect={addCorrect}
                onDone={(st,gx,strk)=>finishChallenge(challenge.id,st,gx,strk)}
                onExit={()=>setView("phase")} />
            : <SeqPlay key={challenge.id} challenge={challenge} color={(PHASES.find(p=>p.id===phaseId)||{}).color}
                onDone={(st,gx)=>finishChallenge(challenge.id,st,gx,0)}
                onExit={()=>setView("phase")} />
        )}

        {view==="reference" && <Reference onClose={()=>setView("map")} progress={{xp,totalStarsAll,totalCorrect,bestStreak,rank:rank.name}}
          onReset={()=>{ try{localStorage.removeItem(STORE_KEY);}catch(e){} setXp(0);setStars({});setBestStreak(0);setTotalCorrect(0); showToast("Progress reset"); }} />}
      </div>

      {/* Tab bar */}
      {(view==="map"||view==="reference") && (
        <div className="tabbar">
          <button className={"tab"+(view==="map"?" active":"")} onClick={()=>setView("map")}><span className="i">🗺️</span>Road Map</button>
          <button className={"tab"+(view==="reference"?" active":"")} onClick={()=>setView("reference")}><span className="i">📖</span>Cockpit</button>
        </div>
      )}
    </div>
  );
}

/* ---------- Map ---------- */

  return (

/* ---------- Quiz ---------- */
function QuizPlay({challenge,color,onDone,onCorrect,onExit}){
  const order=useRef(shuffle(challenge.items.map((_,i)=>i))).current;
  const [step,setStep]=useState(0);
  const [picked,setPicked]=useState(null);
  const [fuel,setFuel]=useState(5);
  const [combo,setCombo]=useState(0);
  const [wrongCount,setWrongCount]=useState(0);
  const [maxStreak,setMaxStreak]=useState(0);
  const [xpGain,setXpGain]=useState(0);
  const [done,setDone]=useState(null); // 'win' | 'fail'

  const item=challenge.items[order[step]];

  const choose=(i)=>{
    if(picked!==null) return;
    setPicked(i);
    if(i===item.answer){
      onCorrect();
      const c=combo+1; setCombo(c); setMaxStreak(m=>Math.max(m,c));
      setXpGain(x=>x+10+Math.min(c-1,5)*2);
    } else {
      setCombo(0); setWrongCount(w=>w+1);
      const f=fuel-1; setFuel(f);
      if(f<=0){ setTimeout(()=>setDone("fail"),650); }
    }
  };
  const next=()=>{
    if(step+1>=challenge.items.length){
      const st=wrongCount===0?3:wrongCount<=2?2:1;
      setDone("win"); onDone(st,xpGain,maxStreak);
    } else { setStep(step+1); setPicked(null); }
  };

  if(done==="fail") return <FailScreen onRetry={onExit} onExit={onExit}/>;
  if(done==="win"){ const st=wrongCount===0?3:wrongCount<=2?2:1;
    return <ResultScreen stars={st} xp={xpGain} streak={maxStreak} onExit={onExit}/>; }

  return (
    <div className="play">
      <div className="play-top">
        <button className="quit" onClick={onExit}>✕</button>
        <div className="fuel"><span className="lab">⛽</span>
          <div className="bars">{Array.from({length:5}).map((_,i)=>(<div key={i} className={"bar"+(i<fuel?(fuel<=2?" low":" on"):"")}/>))}</div>
        </div>
        <div className="combo">{combo>1? "🔥x"+combo : ""}</div>
      </div>
      <div className="qprog"><div style={{width:((step)/challenge.items.length*100)+"%",background:color}}/></div>
      <div className="q dq-display">{item.q}</div>
      <div className="opts">
        {item.options.map((o,i)=>{ let cls="opt";
          if(picked!==null){ if(i===item.answer) cls+=" correct"; else if(i===picked) cls+=" wrong"; else cls+=" faded"; }
          return <button key={i} className={cls} onClick={()=>choose(i)}>
            {o}{picked!==null && i===item.answer && <span className="tag">✓</span>}
            {picked!==null && i===picked && i!==item.answer && <span className="tag">✗</span>}
          </button>;
        })}
      </div>
      {picked!==null && <div className="explain" dangerouslySetInnerHTML={{__html:item.explain}}/>}
      {picked!==null && <button className="btn green" onClick={next}>{step+1>=challenge.items.length?"Finish":"Next →"}</button>}
    </div>
  );
}

/* ---------- Sequence puzzle ---------- */
function SeqPlay({challenge,color,onDone,onExit}){
  const correct=challenge.steps;
  const [pool,setPool]=useState(()=>shuffle(correct.map((t,i)=>({t,orig:i}))));
  const [placed,setPlaced]=useState([]);
  const [fuel,setFuel]=useState(5);
  const [wrongChecks,setWrongChecks]=useState(0);
  const [marks,setMarks]=useState(null); // array of bool or null
  const [done,setDone]=useState(null);

  const place=(card)=>{ if(marks) return; setPlaced([...placed,card]); setPool(pool.filter(c=>c.orig!==card.orig)); };
  const unplace=(idx)=>{ if(marks) return; const card=placed[idx]; setPlaced(placed.filter((_,i)=>i!==idx)); setPool([...pool,card]); };

  const check=()=>{
    const m=placed.map((c,i)=>c.orig===i);
    if(m.every(Boolean)){ const st=wrongChecks===0?3:wrongChecks<=1?2:1; setDone("win"); onDone(st,30+ (wrongChecks===0?15:0)); return; }
    setMarks(m); const f=fuel-1; setFuel(f); setWrongChecks(w=>w+1);
    if(f<=0){ setTimeout(()=>setDone("fail"),700); return; }
    setTimeout(()=>{ // bounce wrong ones back to pool, keep correct prefix
      const keep=[]; const back=[];
      placed.forEach((c,i)=>{ if(c.orig===i && keep.length===i) keep.push(c); else back.push(c); });
      setPlaced(keep); setPool(p=>shuffle([...p,...back])); setMarks(null);
    },800);
  };

  if(done==="fail") return <FailScreen onRetry={onExit} onExit={onExit}/>;
  if(done==="win"){ const st=wrongChecks===0?3:wrongChecks<=1?2:1; return <ResultScreen stars={st} xp={30+(wrongChecks===0?15:0)} streak={0} onExit={onExit}/>; }

  return (
    <div className="play">
      <div className="play-top">
        <button className="quit" onClick={onExit}>✕</button>
        <div className="fuel"><span className="lab">⛽</span>
          <div className="bars">{Array.from({length:5}).map((_,i)=>(<div key={i} className={"bar"+(i<fuel?(fuel<=2?" low":" on"):"")}/>))}</div>
        </div>
        <div className="combo"/>
      </div>
      <div className="q dq-display" style={{fontSize:20,marginBottom:6}}>{challenge.title}</div>
      <div className="seq-hint">Tap the steps in the right order. Tap a placed step to send it back.</div>

      <div className="slots">
        {correct.map((_,i)=>{ const c=placed[i];
          let cls="slot"; if(!c) cls+=" empty"; else cls+=" filled"; if(marks&&c){ cls+= marks[i]?" ok":" bad"; }
          return (<div className={cls} key={i} onClick={()=>c&&unplace(i)}>
            <div className="num">{i+1}</div>
            <div>{c? c.t : "—"}</div>
          </div>);
        })}
      </div>

      {pool.length>0 && <div className="pool">
        {pool.map(c=>(<div className="poolcard" key={c.orig} onClick={()=>place(c)}>{c.t}</div>))}
      </div>}

      <button className="btn green" disabled={placed.length!==correct.length||!!marks} onClick={check}>Check order</button>
    </div>
  );
}

}

    <div className="ref-card">
      <h3>The 3-Second Rule</h3>
      <p>Pick a fixed object ahead. When the car in front passes it, count <b style={{color:"var(--line)"}}>“one-thousand-one, one-thousand-two, one-thousand-three.”</b> Reach it sooner? You're following too closely. Use 4+ seconds in rain or heavy traffic.</p>
    </div>

    <div className="ref-card">
      <h3>Parking on a hill 🪧</h3>
      <p><b style={{color:"var(--line)"}}>Downhill:</b> wheels turned right (toward curb).<br/>
         <b style={{color:"var(--line)"}}>Uphill with curb:</b> wheels left, roll back to curb.<br/>
         <b style={{color:"var(--line)"}}>No curb:</b> wheels turned away from the road.</p>
    </div>

    <div className="ref-card">
      <h3>Dashboard warning lights</h3>
      <div className="dash">
        <span className="dlight" style={{color:"#ff8a5c"}}>🛢️ Oil pressure</span>
        <span className="dlight" style={{color:"#ff5a5f"}}>🌡️ Temperature</span>
        <span className="dlight" style={{color:"#ffd23f"}}>🔋 Alternator</span>
        <span className="dlight" style={{color:"#41e08a"}}>⛽ Fuel</span>
        <span className="dlight" style={{color:"#ff5a5f"}}>🛑 Brake</span>
      </div>
    </div>

    <div className="ref-card">
      <h3>Your stats</h3>
      <p>Rank: <b style={{color:"var(--line)"}}>{progress.rank}</b><br/>
        XP: {progress.xp} · Stars: {progress.totalStarsAll} · Questions right: {progress.totalCorrect} · Best combo: x{progress.bestStreak}</p>
    </div>

    <button className="btn ghost" onClick={()=>{ if(confirmReset()) onReset(); }} style={{fontSize:15}}>Reset all progress</button>
    <div style={{height:30}}/>
  </div>);
}
function confirmReset(){ try{ return window.confirm("Reset all progress? This can't be undone."); }catch(e){ return true; } }

/* ---------- Confetti ---------- */
function Confetti(){
  const colors=["#2DC76F","#FFD23F","#FF5A5F","#4DA3E0","#8A6BFF"];
  const bits=Array.from({length:36}).map((_,i)=>({left:Math.random()*100, delay:Math.random()*.3, dur:1+Math.random()*.8, c:colors[i%colors.length], r:Math.random()*360}));
  return (<div className="confetti">{bits.map((b,i)=>(
    <div key={i} className="cf" style={{left:b.left+"%", background:b.c, animationDuration:b.dur+"s", animationDelay:b.delay+"s", transform:`rotate(${b.r}deg)`}}/>
  ))}</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<DriveQuest/>);

</script>
<script>
(function(){
  var FB=document.getElementById('fallback');
  function note(t){ if(FB){ FB.style.display='flex'; FB.textContent=t; } }
  var SETS={
    react:[
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
      'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
      'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js'
    ],
    dom:[
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
      'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js'
    ],
    babel:[
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js',
      'https://unpkg.com/@babel/standalone@7.24.7/babel.min.js',
      'https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js'
    ]
  };
  function loadFirst(urls,cb){
    var i=0;
    (function next(){
      if(i>=urls.length){cb(new Error('load failed'));return;}
      var s=document.createElement('script'); s.src=urls[i++]; s.async=false;
      s.onload=function(){cb(null);};
      s.onerror=function(){ if(s.parentNode)s.parentNode.removeChild(s); next(); };
      document.head.appendChild(s);
    })();
  }
  function chain(list,done){
    var i=0;
    (function step(){
      if(i>=list.length){done(null);return;}
      loadFirst(list[i++],function(err){ if(err){done(err);return;} step(); });
    })();
  }
  note('Loading DriveQuest\u2026');
  chain([SETS.react,SETS.dom,SETS.babel],function(err){
    if(err){ note('\u26a0\ufe0f DriveQuest needs an internet connection the first time it loads. Please check your connection and reload the page.'); return; }
    try{
      var srcCode=document.getElementById('app-src').textContent;
      var out=Babel.transform(srcCode,{presets:['react']}).code;
      (0,eval)(out);
      if(FB) FB.style.display='none';
    }catch(e){
      note('\u26a0\ufe0f Something went wrong starting DriveQuest: '+(e&&e.message?e.message:e));
      if(window.console) console.error(e);
    }
  });
})();
</script>
